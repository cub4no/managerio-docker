name: Upstream release build

on:
  # Run every 6 hours to detect new Manager.io releases.
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Upstream Manager.io release tag (e.g. 26.6.17.3647 or v26.6.17.3647).
          Leave empty to fetch the latest upstream release.
        required: false
        type: string
        default: ""
      force:
        description: "Rebuild and overwrite image tags even if they already exist."
        required: false
        type: boolean
        default: false

concurrency:
  group: upstream-release-build
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/cub4no/managerio-docker

jobs:
  build:
    name: Detect upstream release and publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve upstream Manager.io version
        id: version
        run: |
          set -euo pipefail
          if [ -n '${{ inputs.version }}' ]; then
            VERSION='${{ inputs.version }}'
            echo "Using version supplied via workflow_dispatch: $VERSION"
          else
            echo "Fetching latest upstream Manager.io release from GitHub API..."
            TAG=$(curl -fsSL https://api.github.com/repos/Manager-io/Manager/releases/latest | jq -r .tag_name)
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "::error::Failed to determine latest upstream Manager.io release tag."
              exit 1
            fi
            VERSION="$TAG"
            echo "Latest upstream release tag: $VERSION"
          fi
          # Strip a leading 'v' so the value matches the MANAGER_VERSION used in the Dockerfile
          # and produces a clean Docker tag.
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Resolved upstream version is empty."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved MANAGER_VERSION=$VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image tags already exist
        id: check
        env:
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          GHCR_TARGET="${{ env.GHCR_IMAGE }}:${VERSION}"
          DOCKERHUB_TARGET="${{ env.DOCKERHUB_IMAGE }}:${VERSION}"
          if [ "$FORCE" = "true" ]; then
            echo "force=true requested; will rebuild ${GHCR_TARGET} and ${DOCKERHUB_TARGET} regardless of existence."
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GHCR_EXISTS=false
          DOCKERHUB_EXISTS=false
          if docker manifest inspect "${GHCR_TARGET}" >/dev/null 2>&1; then
            GHCR_EXISTS=true
          fi
          if docker manifest inspect "${DOCKERHUB_TARGET}" >/dev/null 2>&1; then
            DOCKERHUB_EXISTS=true
          fi

          if [ "$GHCR_EXISTS" = "true" ] && [ "$DOCKERHUB_EXISTS" = "true" ]; then
            echo "Images ${GHCR_TARGET} and ${DOCKERHUB_TARGET} already exist. Nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "At least one registry is missing version ${VERSION}; will build and push."
            echo "GHCR exists: ${GHCR_EXISTS}"
            echo "Docker Hub exists: ${DOCKERHUB_EXISTS}"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check.outputs.exists == 'false'
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
          build-args: |
            MANAGER_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=managerio-docker
            org.opencontainers.image.description=Docker image for Manager.io Server (accounting software for small business)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=GPL-3.0-only
            org.opencontainers.image.url=https://github.com/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=managerio-docker
          cache-to: type=gha,scope=managerio-docker,mode=max

      - name: Skipped summary
        if: steps.check.outputs.exists == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "::notice::Skipped: ${{ env.GHCR_IMAGE }}:${VERSION} and ${{ env.DOCKERHUB_IMAGE }}:${VERSION} already exist. Re-run with force=true to rebuild and push both registries."

      - name: Published summary
        if: steps.check.outputs.exists == 'false' && success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "::notice::Published ${{ env.GHCR_IMAGE }}:${VERSION}, ${{ env.DOCKERHUB_IMAGE }}:${VERSION}, and updated latest tags."
