name: Publish Docker images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-publish.yml"
      - ".github/actions/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - "docker/**"
      - "scripts/**"

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/cub4no/managerio-docker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve latest upstream Manager.io version
        id: version
        run: |
          set -euo pipefail
          TAG=$(curl -fsSL https://api.github.com/repos/Manager-io/Manager/releases/latest | jq -r .tag_name)
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::Failed to determine latest upstream Manager.io release tag."
            exit 1
          fi
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Resolved upstream version is empty."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved MANAGER_VERSION=$VERSION"

      - name: Build and push images
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
          build-args: |
            MANAGER_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=managerio-docker
            org.opencontainers.image.description=Docker image for Manager.io Server (accounting software for small business)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=GPL-3.0-only
            org.opencontainers.image.url=https://github.com/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=managerio-docker
          cache-to: type=gha,scope=managerio-docker,mode=max
